<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chatty</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

  <!-- Join screen -->
  <div id="join" class="min-h-screen flex items-center justify-center">
    <div class="bg-slate-900 p-10 rounded-3xl w-full max-w-md">
      <h1 class="text-5xl font-bold mb-8 text-center">Chatty</h1>
      <input id="username" class="w-full bg-slate-800 px-6 py-5 rounded-2xl text-lg focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="Your name..." />
      <button onclick="join()" class="mt-6 w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-5 rounded-2xl text-lg transition">JOIN</button>
    </div>
  </div>

  <!-- Chat screen -->
  <div id="chat" class="hidden flex flex-col h-screen">
    <header class="bg-slate-900 p-5 border-b border-slate-800">
      <h2 class="text-2xl font-bold">Global Chat</h2>
      <div id="me" class="text-yellow-400 mt-1"></div>
    </header>

    <div id="messages" class="flex-1 p-6 overflow-y-auto space-y-5"></div>

    <div class="bg-slate-900 p-5 flex gap-4 border-t border-slate-800">
      <input id="input" class="flex-1 bg-slate-800 px-6 py-4 rounded-2xl focus:outline-none" placeholder="Type message..." onkeypress="if(event.key==='Enter') send()" />
      <button onclick="send()" class="bg-yellow-500 hover:bg-yellow-400 text-black px-8 rounded-2xl font-bold">Send</button>
    </div>
  </div>

  <script>
    let socket, username;

    function join() {
      username = document.getElementById('username').value.trim();
      if (!username) return alert('Please enter name');

      socket = io();
      socket.emit('join', username);

      document.getElementById('join').classList.add('hidden');
      document.getElementById('chat').classList.remove('hidden');
      document.getElementById('me').textContent = username;

      socket.on('chat message', addMsg);
      socket.on('user joined', n => addSys(n + ' joined'));
      socket.on('user left',   n => addSys(n + ' left'));
    }

    function send() {
      const el = document.getElementById('input');
      if (el.value.trim() && socket) {
        socket.emit('chat message', el.value.trim());
        el.value = '';
      }
    }

    function addMsg({username: u, message: m, time: t}) {
      const div = document.createElement('div');
      div.className = `flex ${u === username ? 'justify-end' : 'justify-start'}`;
      div.innerHTML = `
        <div class="${u === username ? 'bg-yellow-500 text-black' : 'bg-slate-800'} max-w-[75%] px-5 py-3 rounded-2xl">
          <div class="text-xs opacity-70 mb-1">${u} • ${t}</div>
          ${m}
        </div>
      `;
      document.getElementById('messages').appendChild(div);
      div.scrollIntoView({behavior: 'smooth'});
    }

    function addSys(text) {
      const div = document.createElement('div');
      div.className = 'text-center text-slate-500 py-3 italic';
      div.textContent = text;
      document.getElementById('messages').appendChild(div);
      div.scrollIntoView({behavior: 'smooth'});
    }
  </script>
</body>
</html>
